<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitesh Goyal | AI Engineer</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600&family=Inter:wght@300;400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav id="navbar" aria-label="Primary">
        <div class="nav-content">
            <span id="nav-logo" class="logo">HG</span>
            <div class="nav-links">
                <a href="#home">Home</a>
                <a href="#about">About</a>
                <a href="#timeline">Timeline</a>
                <a href="#certificates">Certificates</a>
            </div>
        </div>
    </nav>

    <header id="home" class="section">
        <div class="hero-content fade-in">
            <h1 id="hero-name"></h1>
            <h2 id="hero-title" class="terminal-text">> <span class="cursor">_</span></h2>
            <p id="hero-summary"></p>
            <div class="hero-actions">
                <a id="hero-resume" href="#" target="_blank" class="btn btn-primary"
                    style="display: inline-flex; align-items: center; gap: 8px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#111827" viewBox="0 0 24 24">
                        <path
                            d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z" />
                    </svg>
                    Resume
                </a>
                <a id="hero-github" href="#" target="_blank" class="btn btn-outline"
                    style="display: inline-flex; align-items: center; gap: 8px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                        viewBox="0 0 24 24">
                        <path
                            d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" />
                    </svg>
                    GitHub
                </a>
                <a id="hero-linkedin" href="#" target="_blank" class="btn btn-outline"
                    style="display: inline-flex; align-items: center; gap: 8px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                        viewBox="0 0 24 24">
                        <path
                            d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" />
                    </svg>
                    LinkedIn
                </a>
            </div>
        </div>
        <div class="scroll-hint">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        </div>
    </header>

    <section id="about" class="section section-alt">
        <div class="section-header fade-in">
            <p class="section-eyebrow">ABOUT</p>
            <h2 class="section-title">Signal over noise</h2>
        </div>
        <div class="about-minimal fade-in" aria-live="polite">
            <p id="about-bio" class="about-bio">Loading bio...</p>
            <ul id="about-highlights" class="about-list"></ul>
            <div class="about-meta-group">
                <div class="about-meta-block">
                    <span class="about-label">Focus</span>
                    <div id="about-focus" class="chip-row"></div>
                </div>
                <div class="about-meta-block">
                    <span class="about-label">Toolkit</span>
                    <div id="about-stack" class="chip-row"></div>
                </div>
            </div>
            <div class="about-footer">
                <p id="about-availability" class="about-availability"></p>
                <a id="about-contact" class="btn btn-primary" href="#home">Contact</a>
            </div>
        </div>
    </section>

    <section id="timeline" class="section">
        <h2 class="section-title fade-in">Timeline</h2>

        <div class="filter-controls fade-in" role="tablist" aria-label="Timeline filter">
            <button class="filter-btn active" data-filter="project" aria-pressed="true">Projects</button>
            <button class="filter-btn" data-filter="work" aria-pressed="false">Work</button>
            <button class="filter-btn" data-filter="education" aria-pressed="false">Education</button>
        </div>

        <div id="timeline-grid" class="timeline-container">
        </div>
    </section>

    <section id="certificates" class="section section-alt">
        <div class="section-header fade-in">
            <h2 class="section-title">Certificates & Badges</h2>
            <p class="section-subtitle">A snapshot of curated programmes and credentials that back my build
                track-record.</p>
        </div>
        <div id="certificate-grid" class="cert-grid"></div>
        <div id="cert-controls" class="cert-controls">
            <button id="cert-toggle" class="cert-toggle" aria-expanded="false">Show additional certificates</button>
        </div>
        <div id="certificate-archive" class="cert-grid cert-archive" hidden></div>
    </section>

    <script src="scripts/main.js"></script>
</body>

</html>
